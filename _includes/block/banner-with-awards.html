
<section class="" style="text-align: {{block.text-alignment}}
">
      <div class="max-width {% if block.overlay-opacity != 0p %}relative z-10{% endif %}
        flex         
        {% case block.vert-alignment %}
        {% when 'top' %}
        md:items-start
        items-center
        {% when 'middle' %}
        items-center
        {% when 'bottom' %}
         md:items-end
         items-center
        {% endcase %}

        {% case block.text-alignment %}
        {% when 'left' %}
        justify-center
        md:justify-start

        {% when 'center' %}
        justify-center
        {% when 'right' %}
        md:justify-end
        justify-center

        {% endcase %}
        ">
        <div class="md:flex justify-center items-end text-center md:mt-24">
          <div class="bolder-parent" style=" {% if block.content-max-width %}max-width: {{block.content-max-width}} {% endif %}">
            {% if noH1 == true %}
            {{block.block-content-html | replace: 'h2','h1'}}
            {% else %}
            {{block.block-content-html}}
            {% endif %}
          </div>
          <div>
            <img class="inline-block" style="width: 16rem;" src="/uploads/2025-WLSA-Winner-Logo-Transparent.png" alt="">
          </div>
          
            {% if block.block-content-html contains "h2" %}
              {% assign noH1 = false %}
            {% endif %}
          </div>
        </div>
    </section>

    <style>
      #section-{{forloop.index}} section {
        background-image: url({% if block.background-mobile-image %} {{block.background-mobile-image}} {% else %} {{block.background-desktop-image}} {% endif %});
        background-position: {{}}
      }
      #section-{{forloop.index}} .max-width{
        min-height: {{block.min-height}};
      }

      {% if block.overlay-opacity != 0p %}
      #section-{{forloop.index}} section::before {
        content: " ";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        opacity: {{block.overlay-opacity |  replace: "op", ""}}
      }
      {% endif %}

      {% if block.background-mobile-image %} {% if block.background-desktop-image %}
      @media (min-width: 765px) {
        #section-{{forloop.index}} section {
          
          background-image: url( {{block.background-desktop-image}} );
        }
      }
      {% endif %} {% endif %}


    </style>
